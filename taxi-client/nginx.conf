# Serve the React SPA. The key bit is the `try_files ... /index.html` line:
# when the browser requests /login, /home, /chat etc., nginx looks for a file,
# doesn't find one (it's a client-side route), and falls back to index.html
# so React Router can take over. Without this, refreshing on any non-root
# page would 404.

server {
  listen       80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Long cache for hashed Vite assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Everything else falls through to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Health check endpoint for docker-compose / orchestrators
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
